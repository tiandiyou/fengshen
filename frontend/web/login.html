<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封神榜 - 登录</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="game-title">
            <h1>封神榜</h1>
            <p class="subtitle">伏魔三太子</p>
        </div>
        
        <div class="form-container">
            <div class="tab-buttons">
                <button id="loginTab" class="tab-btn active">登录</button>
                <button id="registerTab" class="tab-btn">注册</button>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginUsername">用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名" required minlength="3" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="loginPassword">密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required minlength="6" maxlength="20">
                </div>
                <button type="submit" class="submit-btn">登录</button>
            </form>
            
            <form id="registerForm" class="auth-form hidden">
                <div class="form-group">
                    <label for="registerUsername">用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名 (3-20字符)" required minlength="3" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" placeholder="请输入密码 (6-20字符)" required minlength="6" maxlength="20">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入密码" required minlength="6" maxlength="20">
                </div>
                <button type="submit" class="submit-btn">注册</button>
            </form>
            
            <div id="errorMessage" class="error-message hidden"></div>
            <div id="successMessage" class="success-message hidden"></div>
        </div>
        
        <div class="footer">
            <p>经典FC游戏重制版</p>
        </div>
    </div>
    
    <script src="js/http-client.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
